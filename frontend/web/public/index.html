<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CtrlS — Главная</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="home">
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>CtrlS</h1>
        <span>Монитор подписок</span>
      </div>
      <nav class="nav">
        <a class="active" href="/home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12l9-8 9 8v8a2 2 0 0 1-2 2h-4V14H9v8H5a2 2 0 0 1-2-2z" stroke-width="2"/></svg>Главная</a>
        <a href="/subscriptions"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="6" width="18" height="12" rx="2" stroke-width="2"/><path d="M3 10h18" stroke-width="2"/></svg>Подписки</a>
        <a href="/calendar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" stroke-width="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke-width="2"/></svg>Календарь</a>
        <a href="/analytics"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 20h18" stroke-width="2"/><path d="M7 20V10M12 20V4M17 20v-6" stroke-width="2"/></svg>Аналитика</a>
        <a href="/settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" stroke-width="2"/><path d="M4 12a8 8 0 0 1 .2-1.8l-1.6-1.2 2-3.4 2 .6A8 8 0 0 1 9 4l.6-2h5l.6 2a8 8 0 0 1 2.4 1.4l2-.6 2 3.4-1.6 1.2A8 8 0 0 1 20 12c0 .6-.1 1.2-.2 1.8l1.6 1.2-2 3.4-2-.6A8 8 0 0 1 15 20l-.6 2h-5l-.6-2A8 8 0 0 1 6.6 18l-2 .6-2-3.4 1.6-1.2A8 8 0 0 1 4 12z" stroke-width="1.6"/></svg>Настройки</a>
      </nav>
      <div class="cta">
        <button class="button-primary" id="openAddSubscription">+ Добавить подписку</button>
      </div>
    </aside>

    <div class="main">
      <div class="topbar">
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="16" height="16"><circle cx="11" cy="11" r="7" stroke-width="2"/><path d="M20 20l-3.5-3.5" stroke-width="2"/></svg>
          <input type="text" placeholder="Поиск подписок..." />
        </div>
        <div class="top-actions">
          <div class="badge" id="notifBadge">🔔<span>0</span></div>
          <a class="avatar" href="/settings" title="Профиль">П</a>
        </div>
      </div>

      <div class="content">
        <section class="mobile-screen">
          <div class="mobile-hero">
            <div class="mobile-hero-head">
              <div class="mobile-hero-label">Прогноз за месяц</div>
              <button class="hero-plus-button" id="heroAddSubscription" type="button">+</button>
            </div>
            <div class="mobile-hero-value" id="kpiMonthly">—</div>
            <div class="mobile-hero-divider"></div>
            <div class="mobile-hero-foot">
              <div>
                <div class="mobile-hero-caption">Активных</div>
                <div class="mobile-hero-foot-value" id="kpiActive">—</div>
              </div>
            </div>
          </div>

          <div class="period-tabs home-period-tabs">
            <button class="tab active" type="button" data-home-period="month">Месяц</button>
            <button class="tab" type="button" data-home-period="half_year">Полгода</button>
            <button class="tab" type="button" data-home-period="year">Год</button>
          </div>

          <div class="warning-banner" id="homeWarningBanner">
            <div class="warning-icon">!</div>
            <div class="warning-text">
              <div class="warning-title" id="homeWarningTitle">Скоро списание</div>
              <div class="warning-subtitle" id="homeWarningText">Нет ближайших списаний</div>
            </div>
          </div>

          <div class="home-mini-grid">
            <div class="mini-stat-card">
              <div class="mini-stat-icon blue">К</div>
              <div>
                <div class="mini-stat-label">Подписок</div>
                <div class="mini-stat-value" id="homeSubscriptionsCount">—</div>
              </div>
            </div>
            <div class="mini-stat-card">
              <div class="mini-stat-icon orange">Д</div>
              <div>
                <div class="mini-stat-label">Ближайший</div>
                <div class="mini-stat-value" id="kpiNext">—</div>
              </div>
            </div>
          </div>

          <div class="section-header">
            <h4>Ближайшие платежи</h4>
            <a href="/subscriptions" class="section-link">Все</a>
          </div>
          <div class="payment-list-mobile" id="upcomingList"></div>

          <div class="section-header">
            <h4>Популярные категории</h4>
          </div>
          <div class="category-grid-mobile" id="homeCategories"></div>
        </div>
        </section>
      </div>
    </div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop"></div>
  <div id="subscriptionModal" class="modal">
    <div class="modal-card">
      <div class="panel-header">
        <h4>Подписка</h4>
        <button class="pill" id="closeModal">Закрыть</button>
      </div>
      <div class="settings-form">
        <div><label>Название</label><input id="subName" type="text" /></div>
        <div class="row">
          <div><label>Сумма</label><input id="subAmount" type="number" step="0.01" /></div>
          <div><label>Валюта</label><input id="subCurrency" type="text" value="RUB" /></div>
        </div>
        <div class="row">
          <div>
            <label>Период</label>
            <select id="subPeriod">
              <option value="monthly">Ежемесячно</option>
              <option value="weekly">Еженедельно</option>
              <option value="yearly">Ежегодно</option>
            </select>
          </div>
          <div><label>Категория</label><input id="subCategory" type="text" /></div>
        </div>
        <div><label>Следующая дата списания</label><input id="subNextDate" type="date" /></div>
        <button class="button-primary" id="saveSubscription">Сохранить</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
